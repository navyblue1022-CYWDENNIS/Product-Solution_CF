<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產品解決方案目錄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.page{max-width:960px;margin:0 auto;padding:20px 16px 60px}
.site-header{padding:24px 0 20px;border-bottom:1px solid #e0ded8;margin-bottom:24px}
.site-header h1{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.site-header p{font-size:13px;color:#888}
.top-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.nav-btn{padding:7px 14px;border:1px solid #d0cec8;border-radius:20px;background:#fff;color:#555;font-size:13px;cursor:pointer;transition:all 0.12s;font-family:inherit}
.nav-btn:hover{border-color:#999;color:#1a1a1a}
.nav-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.view-toggle{display:flex;gap:6px;margin-left:auto;align-items:center}
.vbtn{padding:5px 10px;border:1px solid #d0cec8;border-radius:8px;background:#fff;color:#888;font-size:12px;cursor:pointer;font-family:inherit}
.vbtn.active{background:#f0ede8;color:#1a1a1a;border-color:#b0aea8}
.search-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sinput{flex:1;min-width:160px;padding:9px 13px;border:1px solid #d0cec8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;outline:none}
.sinput:focus{border-color:#888}
select{padding:8px 11px;border:1px solid #d0cec8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-family:inherit;outline:none}
select:focus{border-color:#888}
.count-row{font-size:12px;color:#aaa;margin-bottom:14px}
.sol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.sol-card{background:#fff;border:1px solid #e0ded8;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.12s,box-shadow 0.12s}
.sol-card:hover{border-color:#aaa;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.sol-card.featured{border:2px solid #378ADD}
.card-stripe{height:4px}
.s-water{background:#1D9E75}.s-lube{background:#378ADD}.s-alkanol{background:#BA7517}.s-nitro{background:#D85A30}
.card-inner{padding:14px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.card-title{font-size:14px;font-weight:600;color:#1a1a1a;line-height:1.35;flex:1}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:500;flex-shrink:0}
.p-water{background:#E1F5EE;color:#085041}.p-lube{background:#E6F1FB;color:#0C447C}
.p-alkanol{background:#FAEEDA;color:#633806}.p-nitro{background:#FAECE7;color:#712B13}
.p-rec{background:#EAF3DE;color:#27500A}
.card-sector{font-size:12px;color:#777;margin-bottom:6px}
.card-desc{font-size:12px;color:#999;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.card-chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;padding:2px 7px;border-radius:4px;background:#f0ede8;color:#666}
.list-view{display:flex;flex-direction:column;gap:8px}
.list-item{background:#fff;border:1px solid #e0ded8;border-radius:8px;padding:12px 14px;cursor:pointer;display:grid;grid-template-columns:4px 1fr auto;gap:12px;align-items:center;transition:border-color 0.12s}
.list-item:hover{border-color:#aaa}
.list-accent{border-radius:2px;align-self:stretch;min-height:32px}
.list-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.list-meta{font-size:12px;color:#888}
.list-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.empty{text-align:center;padding:48px;color:#aaa;font-size:14px}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;border:1px solid #e0ded8;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.mh{padding:18px 20px 14px;border-bottom:1px solid #ece9e3;display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:1}
.mtitle{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.msub{font-size:13px;color:#888}
.xbtn{border:none;background:none;cursor:pointer;font-size:18px;color:#aaa;padding:0 4px;line-height:1;font-family:inherit}
.xbtn:hover{color:#555}
.mb{padding:18px 20px}
.section{margin-bottom:20px}
.slabel{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px}
.spec-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f0ede8;font-size:13px}
.spec-row:last-child{border-bottom:none}
.sk{color:#888;flex:0 0 40%;padding-right:8px;line-height:1.4}
.sv{color:#1a1a1a;font-weight:500;flex:1;line-height:1.4}
.sol-block{background:#f8f6f2;border-radius:8px;padding:12px 14px;margin-bottom:8px}
.sol-block-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:5px}
.sol-block-body{font-size:12px;color:#666;line-height:1.7;white-space:pre-line}
.step-list{list-style:none;counter-reset:steps}
.step-list li{counter-increment:steps;display:flex;gap:10px;font-size:12px;color:#666;padding:5px 0;line-height:1.5}
.step-list li::before{content:counter(steps);display:flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:50%;background:#e8e5e0;color:#666;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px}
.combo-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.combo-item{font-size:11px;padding:4px 10px;border-radius:8px;background:#f0ede8;color:#666;border:1px solid #e0ded8}
.combo-item.main{background:#EAF3DE;color:#27500A;border-color:#C0DD97;font-weight:600}
.warn-box{background:#FFF8EE;border:1px solid #F5D08A;border-radius:8px;padding:10px 13px;font-size:12px;color:#7A5200;line-height:1.6;margin-top:8px}
.info-box{background:#EEF5FF;border-radius:8px;padding:10px 13px;font-size:12px;color:#1a4080;line-height:1.6;margin-top:6px}
@media(max-width:600px){
  .sol-grid{grid-template-columns:1fr}
  .search-row{flex-direction:column}
  .view-toggle{margin-left:0}
  .modal{max-height:95vh}
  .spec-row{flex-direction:column;gap:2px}
  .sk{flex:none;font-size:11px}
}
</style>
</head>

<div class="page">
  <div class="site-header">
    <h1>產品解決方案目錄</h1>
    <p>水處理化學品 · 潤滑添加劑 · 醇胺類 · 硝基烷烴燃料添加劑</p>
  </div>

  <div class="top-nav" id="topNav">
    <button class="nav-btn active" onclick="setCat('all',this)">全部</button>
    <button class="nav-btn" onclick="setCat('water',this)">水處理化學品</button>
    <button class="nav-btn" onclick="setCat('lube',this)">潤滑添加劑</button>

      <button class="vbtn" id="vList" onclick="setView('list')">列表</button>

  </div>

  <div class="search-row">
    <input class="sinput" id="sq" placeholder="搜尋產業、功能、產品名稱...">
    <select id="secSel"><option value="">全部產業</option></select>
    <select id="funcSel"><option value="">全部功能</option></select>
  </div>
  <div class="count-row" id="cRow"></div>
  <div id="mainArea"></div>
</div>

<div class="overlay" id="ov" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="mh">
      <div><div class="mtitle" id="mT"></div><div class="msub" id="mS"></div></div>
      <button class="xbtn" onclick="closeM()">✕</button>

    <div class="mb" id="mB"></div>
  </div>
</div>

let curCat='all',curSec='',curFunc='',curQ='',curView='card';

function catLabel(c){return{water:'水處理',lube:'潤滑劑',alkanol:'醇胺類',nitro:'硝基烷烴'}[c]||c}

function buildSelects(){
  const secs=[...new Set(DATA.map(d=>d.sector))].sort();
  const funcs=[...new Set(DATA.map(d=>d.func))].sort();
  document.getElementById('secSel').innerHTML='<option value="">全部產業</option>'+secs.map(s=>`<option>${s}</option>`).join('');
  document.getElementById('funcSel').innerHTML='<option value="">全部功能</option>'+funcs.map(f=>`<option>${f}</option>`).join('');
}

function getFiltered(){
  return DATA.filter(d=>{
    if(curCat!=='all'&&d.cat!==curCat)return false;
    if(curSec&&d.sector!==curSec)return false;
    if(curFunc&&d.func!==curFunc)return false;
    if(curQ){
      const q=curQ.toLowerCase();
      return d.name.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q)||d.sector.toLowerCase().includes(q)||d.func.toLowerCase().includes(q)||(d.chips||[]).some(c=>c.toLowerCase().includes(q));
    }
    return true;
  });
}

function renderCard(d){
  return`<div class="sol-card${d.rec?' featured':''}" onclick="openM(${d.id})">
    <div class="card-stripe s-${d.cat}"></div>
    <div class="card-inner">
      <div class="card-head">
        <div class="card-title">${d.name}</div>
        ${d.rec?'<span class="pill p-rec">推薦</span>':`<span class="pill p-${d.cat}">${catLabel(d.cat)}</span>`}
      </div>
      <div class="card-sector">${d.sector} · ${d.func}</div>
      <div class="card-desc">${d.desc}</div>
      <div class="card-chips">${(d.chips||[]).map(c=>`<span class="chip">${c}</span>`).join('')}</div>
    </div>
  </div>`;
}

function renderList(d){
  return`<div class="list-item" onclick="openM(${d.id})">
    <div class="list-accent s-${d.cat}"></div>
    <div>
      <div class="list-name">${d.name}</div>
      <div class="list-meta">${d.sector} · ${d.func}</div>
    </div>
    <div class="list-right">
      ${d.rec?'<span class="pill p-rec">推薦</span>':''}
      <span class="pill p-${d.cat}">${catLabel(d.cat)}</span>
    </div>
  </div>`;
}

function render(){
  const f=getFiltered();
  document.getElementById('cRow').textContent=f.length+' 項解決方案';
  const area=document.getElementById('mainArea');
  if(!f.length){area.innerHTML='<div class="empty">找不到符合條件的解決方案</div>';return;}
  area.innerHTML=curView==='card'?`<div class="sol-grid">${f.map(renderCard).join('')}</div>`:`<div class="list-view">${f.map(renderList).join('')}</div>`;
}

function setCat(c,el){
  curCat=c;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setView(v){
  curView=v;
  document.getElementById('vCard').classList.toggle('active',v==='card');
  document.getElementById('vList').classList.toggle('active',v==='list');
  render();
}

function openM(id){
  const d=DATA.find(x=>x.id===id);
  if(!d)return;
  document.getElementById('mT').textContent=d.name;
  document.getElementById('mS').textContent=d.sector+' · '+d.func;
  let h='';
  h+=`<div class="section"><div class="slabel">產業應用範圍</div><div class="sol-block"><div class="sol-block-body">${d.sector_detail}</div></div></div>`;
  if(d.specs&&d.specs.length){
    h+=`<div class="section"><div class="slabel">關鍵產品規格</div>`;
    d.specs.forEach(r=>{h+=`<div class="spec-row"><div class="sk">${r[0]}</div><div class="sv">${r[1]}</div></div>`;});
    h+=`</div>`;
  }
  if(d.formula&&d.formula.length){
    h+=`<div class="section"><div class="slabel">配方建議</div>`;
    d.formula.forEach(f=>{h+=`<div class="sol-block"><div class="sol-block-title">${f.title}</div><div class="sol-block-body">${f.body}</div></div>`;});
    h+=`</div>`;
  }
  if(d.steps&&d.steps.length){
    h+=`<div class="section"><div class="slabel">採購 / 導入步驟</div><ol class="step-list">`;
    d.steps.forEach(s=>{h+=`<li>${s}</li>`;});
    h+=`</ol></div>`;
  }
  if(d.combo&&d.combo.length){
    h+=`<div class="section"><div class="slabel">建議搭配產品</div><div class="combo-row">`;
    d.combo.forEach(c=>{h+=`<span class="combo-item${c===d.comboMain?' main':''}">${c}</span>`;});
    h+=`</div></div>`;
  }
  if(d.warn){h+=`<div class="warn-box">${d.warn}</div>`;}
  document.getElementById('mB').innerHTML=h;
  document.getElementById('ov').classList.add('open');
}

function closeM(){document.getElementById('ov').classList.remove('open');}

document.getElementById('sq').addEventListener('input',e=>{curQ=e.target.value;render();});
document.getElementById('secSel').addEventListener('change',e=>{curSec=e.target.value;render();});
document.getElementById('funcSel').addEventListener('change',e=>{curFunc=e.target.value;render();});

buildSelects();
render();
</script>

</html>
