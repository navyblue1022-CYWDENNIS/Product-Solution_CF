<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>化學藥劑整合產品目錄 V3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.page{max-width:1040px;margin:0 auto;padding:20px 16px 60px}
.site-header{padding:24px 0 18px;border-bottom:1px solid #e0ded8;margin-bottom:20px}
.site-header h1{font-size:21px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.site-header p{font-size:12px;color:#999;margin-bottom:8px}
.stat-row{display:flex;gap:10px;flex-wrap:wrap}
.stat-chip{font-size:11px;padding:3px 9px;border-radius:20px;background:#f0ede8;color:#666}
.stat-chip span{font-weight:600;color:#1a1a1a}

.top-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.nav-btn{padding:6px 13px;border:1px solid #d0cec8;border-radius:20px;background:#fff;color:#555;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.1s}
.nav-btn:hover{border-color:#999;color:#1a1a1a}
.nav-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.view-toggle{display:flex;gap:5px;margin-left:auto}
.vbtn{padding:5px 9px;border:1px solid #d0cec8;border-radius:6px;background:#fff;color:#888;font-size:11px;cursor:pointer;font-family:inherit}
.vbtn.active{background:#f0ede8;color:#1a1a1a;border-color:#b0aea8}

.search-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sinput{flex:1;min-width:150px;padding:8px 12px;border:1px solid #d0cec8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;outline:none}
.sinput:focus{border-color:#888}
select{padding:7px 10px;border:1px solid #d0cec8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:12px;cursor:pointer;font-family:inherit;outline:none}
select:focus{border-color:#888}
.count-row{font-size:11px;color:#aaa;margin-bottom:12px}

/* Card grid */
.sol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.sol-card{background:#fff;border:1px solid #e0ded8;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.1s,box-shadow 0.1s}
.sol-card:hover{border-color:#bbb;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.sol-card.featured{border:2px solid #378ADD}
.card-stripe{height:3px}
/* category stripe colors */
.s-water{background:#1D9E75}.s-lube{background:#378ADD}.s-alkanol{background:#BA7517}.s-nitro{background:#D85A30}
.s-coagulation{background:#7F77DD}.s-acid-base{background:#888780}.s-scale{background:#1D9E75}
.s-cip-acid{background:#D85A30}.s-cip-alkali{background:#E24B4A}.s-biocide{background:#D4537E}
.s-special{background:#BA7517}.s-defoam{background:#5DCAA5}.s-surfactant{background:#378ADD}
.s-semi{background:#7F77DD}.s-ix{background:#5DCAA5}.s-boiler{background:#EF9F27}
.card-inner{padding:12px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:5px}
.card-title{font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.3;flex:1}
/* pill colors */
.pill{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;font-weight:500;flex-shrink:0}
.p-water{background:#E1F5EE;color:#085041}.p-lube{background:#E6F1FB;color:#0C447C}
.p-alkanol{background:#FAEEDA;color:#633806}.p-nitro{background:#FAECE7;color:#712B13}
.p-coagulation{background:#EEEDFE;color:#3C3489}.p-acid-base{background:#F1EFE8;color:#444441}
.p-scale{background:#E1F5EE;color:#085041}.p-cip-acid{background:#FAECE7;color:#712B13}
.p-cip-alkali{background:#FCEBEB;color:#791F1F}.p-biocide{background:#FBEAF0;color:#72243E}
.p-special{background:#FAEEDA;color:#633806}.p-defoam{background:#E1F5EE;color:#085041}
.p-surfactant{background:#E6F1FB;color:#0C447C}.p-semi{background:#EEEDFE;color:#3C3489}
.p-ix{background:#E1F5EE;color:#085041}.p-boiler{background:#FAEEDA;color:#633806}
.p-rec{background:#EAF3DE;color:#27500A}
.p-new{background:#FFF3CD;color:#856404}
.card-sector{font-size:11px;color:#888;margin-bottom:5px}
.card-desc{font-size:11px;color:#aaa;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px}
.card-chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{font-size:10px;padding:2px 6px;border-radius:3px;background:#f0ede8;color:#777}
.chip.new-chip{background:#FFF3CD;color:#856404}

/* List view */
.list-view{display:flex;flex-direction:column;gap:6px}
.list-item{background:#fff;border:1px solid #e0ded8;border-radius:8px;padding:10px 13px;cursor:pointer;display:grid;grid-template-columns:3px 1fr auto;gap:10px;align-items:center;transition:border-color 0.1s}
.list-item:hover{border-color:#aaa}
.list-accent{border-radius:2px;align-self:stretch;min-height:28px}
.list-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:1px}
.list-meta{font-size:11px;color:#999}
.list-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;border:1px solid #e0ded8;width:100%;max-width:600px;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.mh{padding:16px 20px 12px;border-bottom:1px solid #ece9e3;display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;border-radius:14px 14px 0 0;z-index:1}
.mtitle{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.msub{font-size:12px;color:#999}
.xbtn{border:none;background:none;cursor:pointer;font-size:17px;color:#bbb;padding:0 4px;line-height:1;font-family:inherit}
.xbtn:hover{color:#555}
.mb{padding:16px 20px 20px}
.m-section{margin-bottom:18px}
.m-section:last-child{margin-bottom:0}
.slabel{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px}
.spec-row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f4f2ee;font-size:12px}
.spec-row:last-child{border-bottom:none}
.sk{color:#999;flex:0 0 38%;padding-right:8px;line-height:1.4}
.sv{color:#1a1a1a;font-weight:500;flex:1;line-height:1.4}
.sol-block{background:#f8f6f2;border-radius:8px;padding:11px 13px;margin-bottom:7px}
.sol-block:last-child{margin-bottom:0}
.sol-block-title{font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.sol-block-body{font-size:11px;color:#666;line-height:1.7;white-space:pre-line}
.step-list{list-style:none;counter-reset:steps}
.step-list li{counter-increment:steps;display:flex;gap:9px;font-size:12px;color:#666;padding:4px 0;line-height:1.5}
.step-list li::before{content:counter(steps);display:flex;align-items:center;justify-content:center;min-width:19px;height:19px;border-radius:50%;background:#e8e5e0;color:#777;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.combo-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.combo-item{font-size:11px;padding:3px 9px;border-radius:6px;background:#f0ede8;color:#666;border:1px solid #e0ded8}
.combo-item.main{background:#EAF3DE;color:#27500A;border-color:#C0DD97;font-weight:600}
.warn-box{background:#FFF8EE;border:1px solid #F5D08A;border-radius:8px;padding:9px 12px;font-size:11px;color:#7A5200;line-height:1.6;margin-top:8px}
.danger-box{background:#FFF0F0;border:1px solid #FFAAAA;border-radius:8px;padding:9px 12px;font-size:11px;color:#8B0000;line-height:1.6;margin-top:8px}
.info-box{background:#EEF5FF;border-radius:8px;padding:9px 12px;font-size:11px;color:#1a4080;line-height:1.6;margin-top:6px}
.industry-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.ind-tag{font-size:11px;padding:3px 8px;border-radius:4px;background:#f0ede8;color:#666}
.ind-tag.active-ind{background:#E6F1FB;color:#185FA5;font-weight:500}
.empty{text-align:center;padding:48px;color:#ccc;font-size:14px}

@media(max-width:600px){
  .sol-grid{grid-template-columns:1fr}
  .search-row{flex-direction:column}
  .view-toggle{margin-left:0}
  .modal{margin:8px auto}
  .spec-row{flex-direction:column;gap:1px}
  .sk{flex:none;font-size:10px;color:#bbb}
}
</style>
</head>

function buildNav(){

  CATS.forEach(c=>{

    b.className='nav-btn'+(c.id==='all'?' active':'');

    nav.insertBefore(b,vt);
  });
}

function buildSelects(){
  const inds=[...new Set(DATA.flatMap(d=>d.industries))].sort();
  const funcs=[...new Set(DATA.map(d=>d.func))].sort();
  document.getElementById('indSel').innerHTML='<option value="">全部產業</option>'+inds.map(s=>`<option>${s}</option>`).join('');
  document.getElementById('funcSel').innerHTML='<option value="">全部功能</option>'+funcs.map(f=>`<option>${f}</option>`).join('');
}

function getFiltered(){
  return DATA.filter(d=>{
    const catMatch = curCat==='all' || d.cat===curCat || 
      (curCat==='cip' && (d.cat==='cip-acid'||d.cat==='cip-alkali'));
    if(!catMatch) return false;
    if(curInd && !d.industries.includes(curInd)) return false;
    if(curFunc && d.func!==curFunc) return false;
    if(curQ){
      const q=curQ.toLowerCase();
      return d.name.toLowerCase().includes(q)||
        (d.nameEn||'').toLowerCase().includes(q)||
        (d.cas||'').toLowerCase().includes(q)||
        d.desc.toLowerCase().includes(q)||
        d.func.toLowerCase().includes(q)||
        d.industries.some(i=>i.toLowerCase().includes(q));
    }
    return true;
  });
}

function renderCard(d){
  const cl=catLabel(d.cat);
  const pillCls = d.rec ? 'p-rec' : 'p-'+d.cat;
  const pillTxt = d.rec ? '推薦' : cl;
  return`<div class="sol-card${d.rec?' featured':''}" onclick="openM(${d.id})">
    <div class="card-stripe s-${d.cat}"></div>
    <div class="card-inner">
      <div class="card-head">
        <div class="card-title">${d.isNew?'★ ':''}${d.name}</div>
        <span class="pill ${pillCls}">${pillTxt}</span>
      </div>
      <div class="card-sector">${d.industries.slice(0,3).join(' · ')} · ${d.func}</div>
      <div class="card-desc">${d.desc}</div>
      <div class="card-chips">
        ${d.isNew?'<span class="chip new-chip">新增</span>':''}
        ${d.cas&&d.cas!=='—'?`<span class="chip">CAS ${d.cas.length>15?d.cas.slice(0,15)+'…':d.cas}</span>`:''}
        ${d.procurement?`<span class="chip">${d.procurement}</span>`:''}
      </div>
    </div>
  </div>`;
}

function renderList(d){
  const cl=catLabel(d.cat);
  return`<div class="list-item" onclick="openM(${d.id})">
    <div class="list-accent s-${d.cat}"></div>
    <div>
      <div class="list-name">${d.isNew?'★ ':''}${d.name}</div>
      <div class="list-meta">${d.industries.slice(0,2).join(' · ')} · ${d.func}</div>
    </div>
    <div class="list-right">
      ${d.rec?'<span class="pill p-rec">推薦</span>':''}
      ${d.isNew?'<span class="pill p-new">新增</span>':''}
      <span class="pill p-${d.cat}">${cl}</span>
    </div>
  </div>`;
}

function render(){
  const f=getFiltered();
  document.getElementById('cRow').textContent=f.length+' 項產品 / 解決方案';
  const area=document.getElementById('mainArea');
  if(!f.length){area.innerHTML='<div class="empty">找不到符合條件的產品</div>';return;}
  area.innerHTML=curView==='card'
    ?`<div class="sol-grid">${f.map(renderCard).join('')}</div>`
    :`<div class="list-view">${f.map(renderList).join('')}</div>`;
}

function setCat(c,el){
  curCat=c;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  render();
}

function setView(v){
  curView=v;
  document.getElementById('vCard').classList.toggle('active',v==='card');
  document.getElementById('vList').classList.toggle('active',v==='list');
  render();
}

function openM(id){
  const d=DATA.find(x=>x.id===id);
  if(!d) return;
  document.getElementById('mT').textContent=(d.isNew?'★ ':'')+d.name;
  document.getElementById('mS').textContent=(d.nameEn||'')+(d.cas&&d.cas!=='—'?' · CAS: '+d.cas:'');
  let h='';
  // 產業
  h+=`<div class="m-section"><div class="slabel">適用產業</div><div class="industry-tags">`;
  d.industries.forEach(i=>{ h+=`<span class="ind-tag active-ind">${i}</span>`; });
  h+=`</div></div>`;
  // 採購
  if(d.procurement){
    h+=`<div class="m-section"><div class="slabel">採購與儲存</div>`;
    h+=`<div class="spec-row"><div class="sk">採購量級</div><div class="sv">${d.procurement}</div></div>`;
    if(d.storage) h+=`<div class="spec-row"><div class="sk">儲運要點</div><div class="sv">${d.storage}</div></div>`;
    if(d.alt) h+=`<div class="spec-row"><div class="sk">替代方案</div><div class="sv">${d.alt}</div></div>`;
    h+=`</div>`;
  }
  // 規格
  if(d.specs&&d.specs.length){
    h+=`<div class="m-section"><div class="slabel">關鍵規格參數</div>`;
    d.specs.forEach(r=>{ h+=`<div class="spec-row"><div class="sk">${r[0]}</div><div class="sv">${r[1]}</div></div>`; });
    h+=`</div>`;
  }
  // 配方
  if(d.formula&&d.formula.length){
    h+=`<div class="m-section"><div class="slabel">配方建議</div>`;
    d.formula.forEach(f=>{ h+=`<div class="sol-block"><div class="sol-block-title">${f.title}</div><div class="sol-block-body">${f.body}</div></div>`; });
    h+=`</div>`;
  }
  // 步驟
  if(d.steps&&d.steps.length){
    h+=`<div class="m-section"><div class="slabel">採購 / 導入步驟</div><ol class="step-list">`;
    d.steps.forEach(s=>{ h+=`<li>${s}</li>`; });
    h+=`</ol></div>`;
  }
  // 搭配
  if(d.combo&&d.combo.length){
    h+=`<div class="m-section"><div class="slabel">建議搭配產品</div><div class="combo-row">`;
    d.combo.forEach(c=>{ h+=`<span class="combo-item${c===d.comboMain?' main':''}">${c}</span>`; });
    h+=`</div></div>`;
  }
  // 警告
  if(d.warn){
    const isDanger=d.warn.includes('劇毒')||d.warn.includes('致癌')||d.warn.includes('致命');
    h+=`<div class="${isDanger?'danger-box':'warn-box'}">${d.warn}</div>`;
  }
  document.getElementById('mB').innerHTML=h;
  document.getElementById('ov').classList.add('open');
}
function closeM(){document.getElementById('ov').classList.remove('open');}

document.getElementById('sq').addEventListener('input',e=>{curQ=e.target.value;render();});
document.getElementById('indSel').addEventListener('change',e=>{curInd=e.target.value;render();});
document.getElementById('funcSel').addEventListener('change',e=>{curFunc=e.target.value;render();});

buildNav();
buildSelects();
render();
</script>
</body>
</html>
